
<div style="max-width: 640px; margin: 0 auto; padding: 1rem 0;">

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px;" id="qr-grid"></div>

  <div style="margin-top: 1.25rem; background: #E1F5EE; border-radius: var(--border-radius-md); padding: 10px 14px; border-left: 3px solid #1D9E75;">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0;">💡 Εκτύπωσε κάθε κάρτα και τοποθέτησέ την στο ταμείο του καταστήματος — ο πελάτης σκανάρει και συμπληρώνει τη φόρμα</p>
  </div>

  <div style="display: flex; justify-content: center; margin-top: 1rem;">
    <button onclick="sendPrompt('Φτιάξε μου printable PDF με τα QR codes για κάθε κατάστημα')">Φτιάξε printable PDF ↗</button>
  </div>

</div>

<script>
const formUrl = 'https://forms.gle/ym1UvckehVMYpyYK7';
const stores = [
  { name: 'Κήπος Café-Bar', icon: '🌿' },
  { name: 'Επιχείρηση 2', icon: '☕' },
  { name: 'Επιχείρηση 3', icon: '🍕' },
  { name: 'Επιχείρηση 4', icon: '🛍️' },
  { name: 'Επιχείρηση 5', icon: '🎯' }
];

const grid = document.getElementById('qr-grid');

stores.forEach(store => {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${encodeURIComponent(formUrl)}&color=0F6E56&bgcolor=FFFFFF&margin=10`;
  
  const card = document.createElement('div');
  card.style.cssText = 'background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 1rem; display: flex; flex-direction: column; align-items: center; gap: 10px;';
  
  card.innerHTML = `
    <div style="width: 8px; height: 8px; border-radius: 50%; background: #1D9E75;"></div>
    <p style="font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0; text-align: center;">${store.icon} ${store.name}</p>
    <img src="${qrUrl}" alt="QR ${store.name}" style="width: 140px; height: 140px; border-radius: var(--border-radius-md);" />
    <p style="font-size: 11px; color: var(--color-text-secondary); margin: 0; text-align: center;">Xanthi MTB Card</p>
    <p style="font-size: 10px; color: var(--color-text-secondary); margin: 0; text-align: center; word-break: break-all;">Check-in</p>
  `;
  
  grid.appendChild(card);
});
</script>
