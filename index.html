<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xanthi MTB Card — Barista App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #fff; min-height: 100vh; }
  .header { background: #1D9E75; padding: 16px 20px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header p  { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .section { padding: 20px; }
  .scanner-box { position: relative; background: #1a1a1a; border-radius: 16px; overflow: hidden; aspect-ratio: 1; max-width: 340px; margin: 0 auto; border: 2px solid #1D9E75; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 60%; height: 60%; border: 2px solid #1D9E75; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); }
  .scan-line { position: absolute; width: 58%; height: 2px; background: #1D9E75; animation: scan 2s linear infinite; opacity: 0.8; }
  @keyframes scan { 0%,100%{top:20%} 50%{top:79%} }
  #canvas { display: none; }
  .scan-hint { text-align: center; margin-top: 12px; font-size: 13px; color: #666; }
  .card-box { background: #1a2a1f; border: 1.5px solid #1D9E75; border-radius: 16px; padding: 16px 20px; margin-bottom: 16px; }
  .card-top { display: flex; align-items: center; gap: 14px; }
  .card-icon { width: 44px; height: 44px; border-radius: 10px; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .card-num { font-size: 20px; font-weight: 700; color: #1D9E75; letter-spacing: 1px; }
  .card-lbl { font-size: 11px; color: #666; margin-bottom: 2px; }
  .user-info { margin-top: 12px; padding-top: 12px; border-top: 1px solid #1D9E75; display: none; }
  .user-name  { font-size: 15px; font-weight: 600; color: #fff; }
  .user-email { font-size: 13px; color: #aaa; margin-top: 3px; }
  .user-city  { font-size: 12px; color: #1D9E75; margin-top: 2px; }
  .msg { margin-top: 10px; font-size: 13px; display: none; }
  .msg-loading { color: #888; }
  .msg-error   { color: #E24B4A; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  select, input[type=number], input[type=text] { width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1.5px solid #333; border-radius: 12px; color: #fff; font-size: 16px; outline: none; appearance: none; }
  select:focus, input:focus { border-color: #1D9E75; }
  select option { background: #1a1a1a; }
  .amount-wrap { position: relative; }
  .amount-wrap input { padding-left: 36px; }
  .euro { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #1D9E75; font-size: 18px; font-weight: 600; }
  .pts-preview { margin-top: 8px; font-size: 13px; color: #1D9E75; text-align: right; }
  .btn-submit { width: 100%; margin-top: 24px; padding: 16px; background: #1D9E75; border: none; border-radius: 14px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; }
  .btn-submit:disabled { background: #333; color: #555; cursor: default; }
  .btn-rescan { width: 100%; margin-top: 12px; padding: 14px; background: transparent; border: 1.5px solid #333; border-radius: 14px; color: #888; font-size: 15px; cursor: pointer; }
  .success-screen { text-align: center; padding: 40px 20px; }
  .ok-icon { font-size: 64px; margin-bottom: 16px; }
  .ok-title { font-size: 24px; font-weight: 700; color: #1D9E75; margin-bottom: 8px; }
  .ok-sub { font-size: 15px; color: #888; margin-bottom: 6px; }
  .ok-points { font-size: 36px; font-weight: 800; color: #fff; margin: 20px 0; }
  .ok-points span { font-size: 16px; color: #666; font-weight: 400; }
  .btn-new { margin-top: 24px; padding: 16px 40px; background: #1D9E75; border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>🚵 Xanthi MTB Card</h1>
  <p>Barista Check-in App</p>
</div>

<div id="screen-scan" class="screen active">
  <div class="section">
    <div class="scanner-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <p class="scan-hint">Στρέψε την κάμερα στο QR της κάρτας</p>
  </div>
</div>

<div id="screen-form" class="screen">
  <div class="section">
    <div class="card-box">
      <div class="card-top">
        <div class="card-icon">🎫</div>
        <div>
          <div class="card-lbl">Κάρτα Μέλους</div>
          <div class="card-num" id="display-card"></div>
        </div>
      </div>
      <div id="msg" class="msg"></div>
      <div id="user-info" class="user-info">
        <div class="user-name"  id="user-name"></div>
        <div class="user-email" id="user-email"></div>
        <div class="user-city"  id="user-city"></div>
      </div>
    </div>

    <label>Κατάστημα</label>
    <select id="store">
      <option value="Κήπος Café-Bar">🌿 Κήπος Café-Bar</option>
      <option value="Επιχείρηση 2">☕ Επιχείρηση 2</option>
      <option value="Επιχείρηση 3">🍕 Επιχείρηση 3</option>
      <option value="Επιχείρηση 4">🛍️ Επιχείρηση 4</option>
      <option value="Επιχείρηση 5">🎯 Επιχείρηση 5</option>
    </select>

    <label>Ποσό Συναλλαγής</label>
    <div class="amount-wrap">
      <span class="euro">€</span>
      <input type="number" id="amount" placeholder="0.00" step="0.50" min="0.50" oninput="updatePoints()" />
    </div>
    <div class="pts-preview" id="pts-preview"></div>

    <label>Barista (προαιρετικό)</label>
    <input type="text" id="barista" placeholder="Το όνομά σου" />

    <button class="btn-submit" id="btn-submit" onclick="submitCheckin()" disabled>
      ✓ Καταχώρηση Check-in
    </button>
    <button class="btn-rescan" onclick="startScanner()">↩ Σκανάρισε ξανά</button>
  </div>
</div>

<div id="screen-success" class="screen">
  <div class="success-screen">
    <div class="ok-icon">✅</div>
    <div class="ok-title">Check-in OK!</div>
    <div class="ok-sub" id="ok-card"></div>
    <div class="ok-sub" id="ok-name"></div>
    <div class="ok-sub" id="ok-store"></div>
    <div class="ok-points" id="ok-points"></div>
    <button class="btn-new" onclick="startScanner()">+ Νέο Check-in</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>

// ── CONFIG ────────────────────────────────────────────
const SHEET_ID    = "10Ak7BNPsBXwdq6djKzURWzMWL8GlefzoApEpCjdxGfQ";
const MEMBERS_TAB = "MTB Members";

const FORM_ACTION  = "https://docs.google.com/forms/u/0/d/e/1FAIpQLSdSNAi0aIOOq0M2T8v_ZOOgf6HIDNT5juZ1mqHnG2UlSGosnw/formResponse";
const ENTRY_CARD   = "entry.1650439515";
const ENTRY_STORE  = "entry.1145135016";
const ENTRY_AMOUNT = "entry.110468251";
const ENTRY_NAME   = "entry.1906187889";
const ENTRY_EMAIL  = "entry.744003285";
// ─────────────────────────────────────────────────────

let card = "", userName = "", userEmail = "";
let scanning = false, stream = null;
let membersCache = null; // cache all members on first load

function screen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className   = 'msg ' + cls;
  el.style.display = text ? 'block' : 'none';
}

// ── FETCH ALL MEMBERS ONCE ────────────────────────────
async function fetchAllMembers() {
  if (membersCache) return membersCache;

  // Fetch entire sheet as CSV — simplest and most reliable
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(MEMBERS_TAB)}`;
  const res  = await fetch(url);
  const csv  = await res.text();

  // Parse CSV
  const lines   = csv.trim().split('\n');
  const members = {};

  for (let i = 1; i < lines.length; i++) {
    // Split by comma but handle quoted fields
    const cols = lines[i].match(/(".*?"|[^",\n]+)(?=\s*,|\s*$)/g) || [];
    const clean = cols.map(c => c.replace(/^"|"$/g, '').trim());

    // Columns: 0=timestamp, 1=card, 2=firstName, 3=lastName, 4=email, 5=phone, 6=city
    const cardKey = clean[1] ? clean[1].toUpperCase() : '';
    if (cardKey) {
      members[cardKey] = {
        cardNumber: clean[1] || '',
        firstName:  clean[2] || '',
        lastName:   clean[3] || '',
        fullName:   ((clean[2] || '') + ' ' + (clean[3] || '')).trim(),
        email:      clean[4] || '',
        phone:      clean[5] || '',
        city:       clean[6] || ''
      };
    }
  }

  membersCache = members;
  console.log('Members loaded:', Object.keys(members).length, members);
  return members;
}

async function startScanner() {
  screen('screen-scan');
  card = userName = userEmail = "";
  document.getElementById('amount').value = "";
  document.getElementById('pts-preview').textContent = "";
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('user-info').style.display = 'none';
  showMsg('', '');

  // Pre-load members in background while scanner opens
  fetchAllMembers().catch(e => console.warn('Pre-load failed:', e));

  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
    const v = document.getElementById('video');
    v.srcObject = stream;
    v.play();
    scanning = true;
    requestAnimationFrame(tick);
  } catch(e) {
    alert("Δεν βρέθηκε κάμερα — δώσε πρόσβαση.");
  }
}

function tick() {
  if (!scanning) return;
  const v = document.getElementById('video');
  const c = document.getElementById('canvas');
  if (v.readyState === v.HAVE_ENOUGH_DATA) {
    c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(v, 0, 0, c.width, c.height);
    const qr = jsQR(ctx.getImageData(0, 0, c.width, c.height).data, c.width, c.height);
    if (qr && qr.data) { onScan(qr.data); return; }
  }
  requestAnimationFrame(tick);
}

function onScan(raw) {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());

  const m = raw.match(/MTB-\d+/i);
  card = m ? m[0].toUpperCase() : raw.substring(0, 20);

  document.getElementById('display-card').textContent = card;
  document.getElementById('user-info').style.display  = 'none';
  document.getElementById('btn-submit').disabled      = true;
  showMsg('⏳ Αναζήτηση χρήστη...', 'msg-loading');
  screen('screen-form');

  fetchAllMembers()
    .then(members => {
      const user = members[card];
      if (user) {
        userName  = user.fullName;
        userEmail = user.email;
        document.getElementById('user-name').textContent  = "👤 " + userName;
        document.getElementById('user-email').textContent = "📧 " + userEmail;
        document.getElementById('user-city').textContent  = user.city ? "🏙️ " + user.city : "";
        document.getElementById('user-info').style.display = 'block';
        showMsg('', '');
      } else {
        showMsg('⚠️ Η κάρτα ' + card + ' δεν βρέθηκε στο μητρώο', 'msg-error');
      }
      updatePoints();
    })
    .catch(e => {
      showMsg('⚠️ Σφάλμα φόρτωσης: ' + e.message, 'msg-error');
      updatePoints();
    });
}

function updatePoints() {
  const amount  = parseFloat(document.getElementById('amount').value) || 0;
  const loading = document.getElementById('msg').textContent.includes('⏳');
  document.getElementById('pts-preview').textContent  = amount > 0 ? `+${Math.floor(amount)} πόντοι` : "";
  document.getElementById('btn-submit').disabled      = (amount <= 0 || loading);
}

async function submitCheckin() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = "Αποστολή...";

  const store  = document.getElementById('store').value;
  const amount = document.getElementById('amount').value;
  const points = Math.floor(parseFloat(amount));

  const fd = new FormData();
  fd.append(ENTRY_CARD,   card);
  fd.append(ENTRY_STORE,  store);
  fd.append(ENTRY_AMOUNT, amount);
  fd.append(ENTRY_NAME,   userName);
  fd.append(ENTRY_EMAIL,  userEmail);

  try {
    await fetch(FORM_ACTION, { method: "POST", mode: "no-cors", body: fd });
  } catch(e) { /* no-cors always throws — expected */ }

  document.getElementById('ok-card').textContent   = card;
  document.getElementById('ok-name').textContent   = userName || "";
  document.getElementById('ok-store').textContent  = store;
  document.getElementById('ok-points').innerHTML   = `+${points} <span>πόντοι</span>`;
  screen('screen-success');
}

startScanner();
</script>
</body>
</html>
