<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Xanthi MTB Card — Barista App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #111; color: #fff; min-height: 100vh; }

  .header { background: #1D9E75; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.8; }

  .section { padding: 20px; }

  /* Scanner */
  .scanner-box { position: relative; background: #1a1a1a; border-radius: 16px; overflow: hidden; aspect-ratio: 1; max-width: 340px; margin: 0 auto; border: 2px solid #1D9E75; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 60%; height: 60%; border: 2px solid #1D9E75; border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); }
  .scan-line { position: absolute; width: 58%; height: 2px; background: #1D9E75; animation: scan 2s linear infinite; opacity: 0.8; }
  @keyframes scan { 0%,100% { top: 20%; } 50% { top: 79%; } }
  #canvas { display: none; }

  .scan-hint { text-align: center; margin-top: 12px; font-size: 13px; color: #666; }

  /* Card detected */
  .card-detected { background: #1a2a1f; border: 1.5px solid #1D9E75; border-radius: 16px; padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
  .card-icon { width: 44px; height: 44px; border-radius: 10px; background: #1D9E75; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .card-num { font-size: 20px; font-weight: 700; color: #1D9E75; letter-spacing: 1px; }
  .card-label { font-size: 11px; color: #666; margin-bottom: 2px; }

  /* Form */
  label { display: block; font-size: 12px; color: #888; margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
  select, input[type=number], input[type=text] {
    width: 100%; padding: 14px 16px; background: #1a1a1a; border: 1.5px solid #333;
    border-radius: 12px; color: #fff; font-size: 16px; outline: none; appearance: none;
  }
  select:focus, input:focus { border-color: #1D9E75; }
  select option { background: #1a1a1a; }

  .amount-wrap { position: relative; }
  .amount-wrap input { padding-left: 36px; }
  .euro { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #1D9E75; font-size: 18px; font-weight: 600; }

  .points-preview { margin-top: 8px; font-size: 13px; color: #1D9E75; text-align: right; }

  .btn-submit { width: 100%; margin-top: 24px; padding: 16px; background: #1D9E75; border: none; border-radius: 14px; color: #fff; font-size: 17px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn-submit:active { opacity: 0.8; }
  .btn-submit:disabled { background: #333; color: #666; cursor: default; }

  .btn-rescan { width: 100%; margin-top: 12px; padding: 14px; background: transparent; border: 1.5px solid #333; border-radius: 14px; color: #888; font-size: 15px; cursor: pointer; }
  .btn-rescan:active { border-color: #555; }

  /* Success */
  .success-screen { text-align: center; padding: 40px 20px; }
  .success-icon { font-size: 64px; margin-bottom: 16px; }
  .success-title { font-size: 24px; font-weight: 700; color: #1D9E75; margin-bottom: 8px; }
  .success-sub { font-size: 15px; color: #888; margin-bottom: 8px; }
  .success-points { font-size: 36px; font-weight: 800; color: #fff; margin: 20px 0; }
  .success-points span { font-size: 16px; color: #666; font-weight: 400; }
  .btn-new { margin-top: 24px; padding: 16px 40px; background: #1D9E75; border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🚵 Xanthi MTB Card</h1>
    <p>Barista Check-in App</p>
  </div>
</div>

<!-- SCREEN 1: Scanner -->
<div id="screen-scan" class="screen active">
  <div class="section">
    <div class="scanner-box">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <p class="scan-hint">Στρέψε την κάμερα στο QR της κάρτας του πελάτη</p>
  </div>
</div>

<!-- SCREEN 2: Check-in Form -->
<div id="screen-form" class="screen">
  <div class="section">

    <div class="card-detected">
      <div class="card-icon">🎫</div>
      <div>
        <div class="card-label">Κάρτα Μέλους</div>
        <div class="card-num" id="display-card">MTB-0001</div>
      </div>
    </div>

    <label>Κατάστημα</label>
    <select id="store">
      <option value="Κήπος Café-Bar">🌿 Κήπος Café-Bar</option>
      <option value="Επιχείρηση 2">☕ Επιχείρηση 2</option>
      <option value="Επιχείρηση 3">🍕 Επιχείρηση 3</option>
      <option value="Επιχείρηση 4">🛍️ Επιχείρηση 4</option>
      <option value="Επιχείρηση 5">🎯 Επιχείρηση 5</option>
    </select>

    <label>Ποσό Συναλλαγής</label>
    <div class="amount-wrap">
      <span class="euro">€</span>
      <input type="number" id="amount" placeholder="0.00" step="0.50" min="0.50" oninput="updatePoints()" />
    </div>
    <div class="points-preview" id="points-preview"></div>

    <label>Barista (προαιρετικό)</label>
    <input type="text" id="barista" placeholder="Το όνομά σου" />

    <button class="btn-submit" id="btn-submit" onclick="submitCheckin()" disabled>
      ✓ Καταχώρηση Check-in
    </button>
    <button class="btn-rescan" onclick="startScanner()">
      ↩ Σκανάρισε ξανά
    </button>

  </div>
</div>

<!-- SCREEN 3: Success -->
<div id="screen-success" class="screen">
  <div class="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Check-in OK!</div>
    <div class="success-sub" id="success-card"></div>
    <div class="success-sub" id="success-store"></div>
    <div class="success-points" id="success-points"></div>
    <button class="btn-new" onclick="startScanner()">
      + Νέο Check-in
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>

// ⚠️ ΑΛΛΑΞΕ ΕΔΩ το URL του Apps Script σου μετά το Deploy:
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzQBU1XgncS7izYuYPu9x_-SYBf4G8n02Rkeepojd7PevI3xnSSlJZPAzjowz0KEv0/exec";
//const BACKEND_URL = "https://script.google.com/macros/s/AKfycbzQBU1XgncS7izYuYPu9x_-SYBf4G8n02Rkeepojd7PevI3xnSSlJZPAzjowz0KEv0/exec";

let currentCard = "";
let scanning = false;
let stream = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function startScanner() {
  showScreen('screen-scan');
  currentCard = "";
  document.getElementById('amount').value = "";
  document.getElementById('points-preview').textContent = "";
  document.getElementById('btn-submit').disabled = true;

  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: 640, height: 640 } 
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.play();
    scanning = true;
    requestAnimationFrame(scanFrame);
  } catch(e) {
    alert("Δεν βρέθηκε κάμερα. Βεβαιώσου ότι έδωσες πρόσβαση στην κάμερα.");
  }
}

function scanFrame() {
  if (!scanning) return;
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code && code.data) {
      onQRDetected(code.data);
      return;
    }
  }
  requestAnimationFrame(scanFrame);
}

function onQRDetected(data) {
  scanning = false;
  if (stream) stream.getTracks().forEach(t => t.stop());

  // Δέχεται MTB-XXXX format ή οποιοδήποτε QR
  const match = data.match(/MTB-\d+/i);
  currentCard = match ? match[0].toUpperCase() : data.substring(0, 20);
  
  document.getElementById('display-card').textContent = currentCard;
  showScreen('screen-form');
  document.getElementById('amount').focus();
}

function updatePoints() {
  const amount = parseFloat(document.getElementById('amount').value) || 0;
  const points = Math.floor(amount);
  const btn = document.getElementById('btn-submit');
  const preview = document.getElementById('points-preview');
  
  if (amount > 0) {
    preview.textContent = `+${points} πόντοι για τον κάτοχο`;
    btn.disabled = false;
  } else {
    preview.textContent = "";
    btn.disabled = true;
  }
}

async function submitCheckin() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = "Αποστολή...";

  const payload = {
    cardNumber: currentCard,
    store: document.getElementById('store').value,
    amount: document.getElementById('amount').value,
    barista: document.getElementById('barista').value
  };

  try {
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });
    const result = await res.json();

    if (result.success) {
      document.getElementById('success-card').textContent = currentCard;
      document.getElementById('success-store').textContent = payload.store;
      document.getElementById('success-points').innerHTML = 
        `+${result.points} <span>πόντοι</span>`;
      showScreen('screen-success');
    } else {
      alert("Σφάλμα: " + result.message);
      btn.disabled = false;
      btn.textContent = "✓ Καταχώρηση Check-in";
    }
  } catch(err) {
    alert("Σφάλμα σύνδεσης. Έλεγξε το internet.");
    btn.disabled = false;
    btn.textContent = "✓ Καταχώρηση Check-in";
  }
}

// Ξεκίνα scanner
startScanner();
</script>
</body>
</html>
